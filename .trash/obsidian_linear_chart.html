
<div style="padding: 1rem 0;">
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #7F77DD;"></span>Preço (USD)</span>
  </div>
  <div style="position: relative; width: 100%; height: 340px;">
    <canvas id="obsidianChart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const data = [42, 47, 53, 61, 58, 67, 72, 65, 78, 84, 91, 88];

new Chart(document.getElementById('obsidianChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: 'Preço',
      data,
      borderColor: '#7F77DD',
      backgroundColor: 'rgba(127, 119, 221, 0.12)',
      borderWidth: 2,
      pointBackgroundColor: '#7F77DD',
      pointBorderColor: '#7F77DD',
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.35,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#3C3489',
        titleColor: '#CECBF6',
        bodyColor: '#EEEDFE',
        padding: 10,
        callbacks: {
          label: ctx => ' $' + ctx.parsed.y
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(127,119,221,0.08)' },
        ticks: { color: '#888780', font: { size: 12 }, autoSkip: false }
      },
      y: {
        min: 30,
        max: 100,
        grid: { color: 'rgba(127,119,221,0.1)' },
        ticks: {
          color: '#888780',
          font: { size: 12 },
          callback: v => '$' + v
        }
      }
    }
  }
});
</script>
